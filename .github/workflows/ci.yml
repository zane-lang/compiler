name: CI

on:
  merge_group:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install devbox + Nix + devbox.json packages
        uses: jetify-com/devbox-install-action@v0.15.0

      - name: Sanity check
        run: devbox list

      - name: Init Meson
        run: devbox run -- just init

      - name: clang-check
        run: devbox run -- just check
